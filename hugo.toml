baseURL = "https://LMDAWN1127.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "DAWN's Blog"
theme = "PaperMod"
paginate = 10

enableEmoji = true
enableRobotsTXT = true

[params]
  env = "production"
  description = "技术分享 | 学习笔记 | 生活记录"
  keywords = ["博客", "技术", "Claude Code", "AI", "CentOS"]
  author = "DAWN"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true
  comments = true

  # 启用个人主页模式
  [params.profileMode]
    enabled = true
    imageUrl = "/images/DAWN.jpg"
    Title = "👋 Hi, 我是 DAWN"
    Content = """
    热爱技术的开发者 🚀

    专注 AI 编程工具、Linux 运维、Web 开发

    喜欢探索新技术，折腾服务器，写代码解决问题
    """

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/LMDAWN1127"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.editPost]
    URL = ""
    Text = "编辑本文"
    appendFilePath = true

  [params.assets]
    favicon = "/favicon.svg"
    disableFingerprinting = true

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = "DAWN's Blog"
    icon = "🖊️"

[[menu.main]]
  identifier = "about"
  name = "👤 关于"
  url = "/about/"
  weight = 5

[[menu.main]]
  identifier = "posts"
  name = "📝 文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "📚 归档"
  url = "/archives/"
  weight = 15

[[menu.main]]
  identifier = "tags"
  name = "🏷️ 标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "categories"
  name = "📂 分类"
  url = "/categories/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "🔍 搜索"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[taxonomies]
  category = "categories"
  tag = "tags"
